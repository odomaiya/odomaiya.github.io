<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel Admin</title>

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div class="login">

<h2>Admin</h2>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<div class="container">

<div class="dashboard">

<div class="cardDash">
<h3>Produtos</h3>
<span id="dash-produtos">0</span>
</div>

<div class="cardDash">
<h3>Estoque</h3>
<span id="dash-estoque">0</span>
</div>

</div>

<table>

<thead>
<tr>
<th>Data</th>
<th>Total</th>
<th>Endereço</th>
</tr>
</thead>

<tbody id="lista-pedidos"></tbody>

</table>

</div>

<script defer src="auth.js"></script>
<script defer src="dashboard.js"></script>
<script defer src="pedidos.js"></script>

<script>

document.addEventListener("DOMContentLoaded",()=>{

try{

if(typeof verificarAuth==="function"){
verificarAuth()
}

if(typeof carregarDashboard==="function"){
carregarDashboard()
}

if(typeof carregarPedidos==="function"){
carregarPedidos()
}

}catch(e){
console.warn("Erro admin:",e)
}

})

</script>

</body>
</html>
