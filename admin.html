<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Odòmáiyà Artigos Religiosos</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.png">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="header">

<div class="logo-area">
<img src="logo.png" id="logoAdmin" class="logo">
<h1>Odòmáiyà</h1>
</div>

<div class="search-area">
<input id="busca" placeholder="Buscar produtos">
</div>

<div class="cart-icon" onclick="abrirCarrinho()">
🛒 <span id="cartCount">0</span>
</div>

</header>


<main>

<div id="produtos" class="produtos-grid"></div>

</main>


<script>

const API="SEU_APPS_SCRIPT_URL"

let carrinho=[]


/************************
CARREGAR PRODUTOS
************************/

async function carregarProdutos(){

const res=await fetch(API,{
method:"POST",
body:JSON.stringify({action:"listarProdutos"})
})

const lista=await res.json()

render(lista)

}


function render(lista){

const area=document.getElementById("produtos")

area.innerHTML=""

lista.forEach(p=>{

const card=document.createElement("div")

card.className="produto"

card.innerHTML=`

<img src="${p.imagem}">

<h3>${p.nome}</h3>

<p>R$ ${p.preco}</p>

<button onclick='addCarrinho(${JSON.stringify(p)})'>
Comprar
</button>

`

area.appendChild(card)

})

}


/************************
CARRINHO
************************/

function addCarrinho(p){

carrinho.push(p)

document.getElementById("cartCount").innerText=carrinho.length

}


function abrirCarrinho(){

let msg="Pedido Odòmáiyà:%0A%0A"

let total=0

carrinho.forEach(p=>{

msg+=`${p.nome} - R$${p.preco}%0A`

total+=Number(p.preco)

})

msg+=`%0A Total: R$${total}`

window.open(
"https://wa.me/554996048808?text="+msg
)

}


/************************
ADMIN SECRETO
************************/

const logo=document.getElementById("logoAdmin")

let clicks=0
let timer


function abrirAdmin(){

const u=prompt("Usuário")
const s=prompt("Senha")

if(u==="adm" && s==="99861309"){

window.location="admin.html"

}

}


/* 7 cliques rápidos */

logo.addEventListener("click",()=>{

clicks++

clearTimeout(timer)

timer=setTimeout(()=>clicks=0,800)

if(clicks>=7){

abrirAdmin()

}

})


/* segurar 3 segundos */

let pressTimer

logo.addEventListener("touchstart",()=>{

pressTimer=setTimeout(()=>{

abrirAdmin()

},3000)

})

logo.addEventListener("touchend",()=>{

clearTimeout(pressTimer)

})


/* CTRL SHIFT 1 */

document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.shiftKey && e.key==="!"){

abrirAdmin()

}

})


/************************
PWA
************************/

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js")

}

carregarProdutos()

</script>

</body>
</html>
