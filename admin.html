<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Painel Odòmáiyà</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,250px);
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

button{
padding:8px 12px;
border:none;
background:#0a66ff;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h2>Painel Produtos</h2>

<button onclick="novo()">Novo Produto</button>

</header>

<div class="grid" id="lista"></div>

<script>

const API="SEU_APPS_SCRIPT_URL"


async function carregar(){

const res=await fetch(API,{
method:"POST",
body:JSON.stringify({action:"listarProdutos"})
})

const lista=await res.json()

render(lista)

}


function render(lista){

const area=document.getElementById("lista")

area.innerHTML=""

lista.forEach(p=>{

const c=document.createElement("div")

c.className="card"

c.innerHTML=`

<img src="${p.imagem}">

<h3>${p.nome}</h3>

<p>R$ ${p.preco}</p>

<p>Estoque: ${p.estoque}</p>

<button onclick='editar(${JSON.stringify(p)})'>
Editar
</button>

`

area.appendChild(c)

})

}


/************************
NOVO
************************/

function novo(){

const nome=prompt("Nome produto")

gerarDescricaoIA(nome)

}


/************************
IA DESCRIÇÃO
************************/

async function gerarDescricaoIA(nome){

const res=await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"descricaoIA",
nome:nome
})
})

const data=await res.json()

alert(data.descricao)

}


/************************
IA IMAGEM
************************/

async function gerarImagemIA(nome){

const res=await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"imagemIA",
nome:nome
})
})

const data=await res.json()

return data.url

}


carregar()

</script>

</body>
</html>
