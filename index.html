<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odòmàiyá Artigos Religiosos</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Ícones -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="topo">
  <div class="logo-area">
    <img src="logo.png" class="logo">
    <div>
      <h1>Odòmàiyá</h1>
      <p>Artigos Religiosos</p>
    </div>
  </div>

  <div class="social">
    <a href="https://wa.me/555496048808" target="_blank">
      <i class="fab fa-whatsapp"></i> WhatsApp
    </a>
    <a href="https://www.instagram.com/odomaia_artigosreligiosos" target="_blank">
      <i class="fab fa-instagram"></i> Instagram
    </a>
  </div>
</header>

<section class="busca-area">
  <input type="text" id="busca" placeholder="Buscar produto...">
  <div id="filtros"></div>
</section>

<section id="produtos" class="grid"></section>

<button class="btn-carrinho" onclick="abrirCarrinho()">
🛒 <span id="contadorCarrinho">0</span>
</button>

<div id="drawerCarrinho" class="drawer">
  <div class="drawer-content">
    <div class="drawer-header">
      <h3>Seu Carrinho</h3>
      <button onclick="fecharCarrinho()">✕</button>
    </div>
    <div id="itensCarrinho"></div>
    <div class="total">Total: <span id="valorTotal">R$ 0,00</span></div>
    <button onclick="abrirCheckout()" class="btn-finalizar">Finalizar Pedido</button>
  </div>
</div>

<div id="modalCheckout" class="modal">
  <div class="modal-content" id="checkoutConteudo"></div>
</div>

<footer class="rodape">
  📍 R. Sete de Agosto, 28 - Centro<br>
  Passo Fundo - RS, 99025-030<br>
  Odòmàiyá Artigos Religiosos © 2026
</footer>

<script src="js/app.js"></script>
</body>
</html>
