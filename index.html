<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Odòmáiyà Artigos Religiosos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="logo-area">
    <img src="logo.png" class="logo">
    <div>
      <h1>Odòmáiyà</h1>
      <span>Artigos Religiosos</span>
    </div>
  </div>
</header>

<section class="busca-area">
  <input type="text" id="busca" placeholder="Buscar produto...">
</section>

<main>
  <div id="produtos" class="grid"></div>
</main>

<button class="btn-carrinho" id="abrirCarrinho">
 🛒 <span id="contadorCarrinho">0</span>
</button>

<div class="drawer-carrinho" id="drawer">
  <h2>Seu Pedido</h2>
  <div id="carrinho-itens"></div>

  <div class="total-area">
    <strong>Total:</strong>
    <span id="carrinho-total">R$ 0,00</span>
  </div>

  <div class="checkout-area">
    <input id="cliente" placeholder="Seu nome">
    <select id="entrega">
      <option value="Retirada">Retirada</option>
      <option value="Entrega">Entrega</option>
    </select>
    <select id="pagamento">
      <option value="Pix">Pix</option>
      <option value="Dinheiro">Dinheiro</option>
      <option value="Cartão">Cartão</option>
    </select>
    <button id="btn-finalizar">Finalizar Pedido</button>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
