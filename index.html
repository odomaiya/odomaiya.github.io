<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odòmàiyá Artigos Religiosos</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<body>

<header class="topo">

    <img src="logo.png" class="logo">
    <div>
      <h1>Odòmàiyá</h1>

    </div>
  </div>

  <div class="social">

  </div>
</header>

<section class="busca-area">
  <input type="text" id="busca" placeholder="Buscar produto...">
  <div id="filtros"></div>
</section>

<section id="produtos" class="grid"></section>

<div class="carrinho-lateral">
  <h3>Seu Carrinho</h3>
  <div id="itensCarrinho"></div>
  <div class="total">Total: <span id="valorTotal">R$ 0,00</span></div>
  <button onclick="abrirCheckout()" class="btn-finalizar">Finalizar Pedido</button>

<div id="modalCheckout" class="modal">
  <div class="modal-content" id="checkoutConteudo"></div>
</div>

<script src="js/app.js"></script>
