<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odòmáiyà | Artigos Religiosos</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
  <div class="logo">
    <h1>Odòmáiyà</h1>
    <span>Artigos Religiosos</span>
  </div>

  <div class="actions">
    <input type="text" id="buscar" placeholder="Buscar produto...">
    <select id="filtroCategoria">
      <option value="">Todas Categorias</option>
    </select>
    <button id="btnCarrinho">Carrinho (<span id="contador">0</span>)</button>
  </div>
</header>

<main>
  <div id="produtos" class="grid"></div>
</main>

<!-- CARRINHO -->
<aside id="carrinho" class="carrinho">
  <div class="carrinho-header">
    <h2>Seu Carrinho</h2>
    <button id="fecharCarrinho">X</button>
  </div>

  <div id="carrinhoItens" class="carrinho-itens"></div>

  <div class="resumo">
    <div>Total: <strong id="total">R$ 0,00</strong></div>
    <button id="irCheckout" class="btn-primary">Finalizar</button>
  </div>
</aside>

<!-- CHECKOUT 3 ETAPAS -->
<div id="checkoutModal" class="checkout-modal">
  <div class="checkout-box">
    <div id="etapas"></div>
    <div id="checkoutConteudo"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/state.js"></script>
<script src="js/ui.js"></script>
<script src="js/checkout.js"></script>
<script src="js/app.js"></script>

</body>
</html>
