<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odòmáiyà Artigos Religiosos</title>

<link rel="stylesheet" href="style.css">
<script defer src="app.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

</head>
<body>

<header class="header">
    <div class="logo-area">
        <img src="logo.png" class="logo">
        <div>
            <h1>Odòmáiyà</h1>
            <p>Artigos Religiosos</p>
        </div>
    </div>

    <div class="icons">
        <a href="#"><img src="whatsapp.png" class="icon"></a>
        <a href="#"><img src="instagram.png" class="icon"></a>
    </div>
</header>

<section class="search-area">
    <input type="text" id="search" placeholder="Buscar produto...">
    <div id="filtros"></div>
</section>

<section id="produtos" class="produtos"></section>

<!-- Carrinho -->
<div class="cart-button" onclick="toggleCarrinho()">
    🛒 <span id="cart-count">0</span>
</div>

<div id="carrinho" class="carrinho">
    <div class="carrinho-header">
        <h2>Seu Carrinho</h2>
        <button onclick="toggleCarrinho()">✕</button>
    </div>

    <div id="cart-items"></div>

    <div class="carrinho-footer">
        <h3>Total: <span id="cart-total">R$ 0,00</span></h3>
        <button onclick="abrirCheckout()">Finalizar Pedido</button>
    </div>
</div>

<!-- Checkout -->
<div id="checkout" class="checkout hidden">
    <div class="checkout-box">

        <h2>Finalizar Pedido</h2>

        <input id="nome" placeholder="Nome completo">
        <input id="cep" placeholder="CEP">
        <input id="rua" placeholder="Rua">
        <input id="numero" placeholder="Número">
        <input id="cidade" placeholder="Cidade">

        <select id="pagamento">
            <option value="Cartão">Cartão</option>
            <option value="Dinheiro">Dinheiro</option>
            <option value="Pix">Pix</option>
        </select>

        <button onclick="finalizarPedido()">Enviar Pedido</button>
        <button onclick="fecharCheckout()" class="secondary">Cancelar</button>

    </div>
</div>

<footer>
    <p><strong>Odòmáiyà Artigos Religiosos</strong></p>
    <p>R. Sete de Agosto, 28 – Centro</p>
    <p>Passo Fundo – RS</p>
</footer>

</body>
</html>
