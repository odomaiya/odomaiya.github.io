<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Odòmáiyà</title>

<meta name="theme-color" content="#0b1a2f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="logo-area">
    <img src="logo.png" class="logo">
    <h1>Odòmáiyà</h1>
  </div>

  <div class="header-actions">
    <input type="text" id="busca" placeholder="Buscar produtos...">
    <button onclick="abrirCarrinho()" class="btn-carrinho">
      🛒 <span id="contadorCarrinho">0</span>
    </button>
  </div>
</header>

<!-- CATEGORIAS -->
<div class="categorias-container">
  <div id="categorias"></div>
</div>

<!-- GRID PRODUTOS -->
<main>
  <div id="produtos" class="grid-produtos"></div>
</main>

<!-- DRAWER CARRINHO -->
<div id="overlay"></div>

<div id="carrinho" class="drawer">
  <div id="itensCarrinho"></div>
  <div class="footer-carrinho">
    <h3>Total: <span id="valorTotal">R$ 0,00</span></h3>
    <button onclick="abrirCheckout()" class="btn-principal">Finalizar Pedido</button>
  </div>
</div>

<!-- MODAL CHECKOUT -->
<div id="modalCheckout" class="modal">
  <div class="modal-content">
    <div id="checkoutEtapas"></div>
  </div>
</div>

<!-- MODAL SUGESTÃO INTELIGENTE -->
<div id="modalSugestao" class="modal">
  <div class="modal-content sugestao-box">
    <div id="sugestaoConteudo"></div>
  </div>
</div>

<!-- LOADING GLOBAL -->
<div id="loadingGlobal" class="loading-global">
  <div class="spinner"></div>
</div>

<script src="app.js"></script>
</body>
</html>
