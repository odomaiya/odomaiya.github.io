<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Odòmáiyà Artigos Religiosos</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.png">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ================= HEADER ================= -->

<header class="header">
  <div class="header-inner">
    <img src="logo.png" class="logo">
    <div class="cart-area" id="btnCheckout">
      <span class="cart-icon">🛍</span>
      <span id="contadorCarrinho">0</span>
    </div>
  </div>
</header>

<!-- ================= LOADER GLOBAL ================= -->

<div id="globalLoader" class="global-loader hidden">
  <div class="loader"></div>
</div>

<!-- ================= PRODUTOS ================= -->

<main>
  <section class="produtos-grid" id="produtos"></section>
</main>

<!-- ================= CHECKOUT MODAL ================= -->

<div id="modalCheckout" class="checkout-modal hidden">
  <div class="checkout-box">
    <button class="fechar" onclick="Checkout.fechar()">✕</button>
    <div id="checkoutSteps"></div>
  </div>
</div>

<!-- ================= JS ================= -->

<script src="js/api.js"></script>
<script src="js/analytics.js"></script>
<script src="js/estoque.js"></script>
<script src="js/ui.js"></script>
<script src="js/checkout.js"></script>
<script src="js/app.js"></script>

</body>
</html>
