<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odòmàiyá Artigos Religiosos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="topo">
  <div class="logo-area">
    <img src="logo.png" class="logo">
    <div>
      <h1>Odòmàiyá</h1>
      <p>Artigos Religiosos</p>
    </div>
  </div>

  <div class="social">
    <a href="https://wa.me/555496048808" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
    </a>
    <a href="https://www.instagram.com/odomaia_artigosreligiosos" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733558.png">
    </a>
  </div>
</header>

<section class="busca-area">
  <input type="text" id="busca" placeholder="Buscar produto..." oninput="buscarProduto()">
  <div id="filtros"></div>
</section>

<section id="produtos" class="grid"></section>

<button class="btn-flutuante" onclick="abrirCarrinho()">
  🛒 <span id="contadorCarrinho">0</span>
</button>

<!-- CARRINHO -->
<div id="modalCarrinho" class="modal">
  <div class="modal-content">
    <h3>Seu Carrinho</h3>
    <div id="itensCarrinho"></div>
    <p class="total">Total: <span id="valorTotal">R$ 0,00</span></p>
    <button onclick="abrirCheckout()" class="btn-primario">Finalizar Pedido</button>
    <button onclick="fecharCarrinho()" class="btn-secundario">Fechar</button>
  </div>
</div>

<!-- CHECKOUT -->
<div id="modalCheckout" class="modal">
  <div class="modal-content" id="conteudoCheckout"></div>
</div>

<footer class="rodape">
  <p><strong>Odòmàiyá Artigos Religiosos</strong></p>
  <p>R. Sete de Agosto, 28 - Centro</p>
  <p>Passo Fundo - RS, 99025-030</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
