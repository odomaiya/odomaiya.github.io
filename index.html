<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Odòmáiyà Artigos Religiosos</title>

<meta name="description" content="Loja espiritual de artigos religiosos de matriz africana.">

<link rel="icon" href="favicon.png">
<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animations.css">

<meta name="theme-color" content="#0a3cff">

</head>

<body>

<header class="topo">

<div class="logo-area">

<img src="logo.png" class="logo">

<h1>Odòmáiyà</h1>

</div>

<div class="busca-area">

<input
id="buscaInput"
placeholder="Buscar produtos espirituais..."
autocomplete="off"
>

</div>

<div class="menu-area">

<button onclick="toggleCarrinho()">
🛒
</button>

</div>

</header>


<section id="banner"></section>


<section class="secao">

<h2>Vitrine Espiritual</h2>

<div id="vitrine"></div>

</section>


<section class="secao">

<h2>Destaques</h2>

<div id="destaques" class="grid"></div>

</section>


<section class="secao">

<h2>Promoções</h2>

<div id="promocoes" class="grid"></div>

</section>


<section class="secao">

<h2>Mais Vendidos</h2>

<div id="ranking" class="grid"></div>

</section>


<section class="secao">

<h2>Você também pode gostar</h2>

<div id="sugestoes" class="grid"></div>

</section>


<section class="secao">

<h2>Produtos</h2>

<div id="produtosGrid" class="grid"></div>

</section>


<div id="carrinho" class="carrinho">

<h2>Seu Pedido</h2>

<div id="carrinhoItens"></div>

<div class="carrinho-total">

<span>Total</span>

<span id="carrinhoTotal">R$ 0</span>

</div>

<button onclick="finalizarPedido()">
Finalizar no WhatsApp
</button>

</div>


<footer id="rodape">

<p>

Odòmáiyà Artigos Religiosos  
Axé • Proteção • Espiritualidade

</p>

</footer>



<script src="js/config.js"></script>

<script src="js/api.js"></script>

<script src="js/auth.js"></script>

<script src="js/estoque.js"></script>

<script src="js/ui.js"></script>

<script src="js/banner.js"></script>

<script src="js/vitrine.js"></script>

<script src="js/vitrine3d.js"></script>

<script src="js/busca.js"></script>

<script src="js/cart.js"></script>

<script src="js/checkout.js"></script>

<script src="js/ranking.js"></script>

<script src="js/recomendacoes.js"></script>

<script src="js/sugestoes.js"></script>

<script src="js/particles.js"></script>

<script src="js/app.js"></script>


<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js");

}

</script>

</body>
</html>
