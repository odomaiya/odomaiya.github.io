<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odòmáiyà Artigos Religiosos</title>
  
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- CONTROLE DE CACHE -->
<link rel="stylesheet" href="css/style.css?v=1.3">
<script src="js/app.js?v=1.3" defer></script>

<!-- PWA / INSTALAÇÃO -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1a2f">

<link rel="apple-touch-icon" href="logo.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

</head>

<div id="overlay" class="overlay" onclick="fecharCarrinho()"></div>
  
<body>

<div id="instalarApp" class="instalar-app">
  <div class="instalar-box">
    <h3>📲 Instale o App Odòmáiyà</h3>
    <p id="textoInstalacao"></p>
    <button onclick="fecharInstalacao()">Entendi</button>
  </div>
</div>

<header class="header">
  <div class="logo-area">
    <img src="logo.png" class="logo">
    <div>
      <h1>Odòmáiyà</h1>
      <p>Artigos Religiosos</p>
    </div>
  </div>

  <div class="social">
    <a href="https://wa.me/555496048808" target="_blank" class="social-link">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" class="icon-social">
      WhatsApp
    </a>

    <a href="https://www.instagram.com/odomaia_artigosreligiosos" target="_blank" class="social-link">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733558.png" class="icon-social">
      Instagram
    </a>
  </div>
</header>

<section class="filtros">
  <input type="text" id="busca" placeholder="Buscar produto...">
  <div id="categorias"></div>
</section>

<section id="produtos" class="grid"></section>

<button class="btn-carrinho" onclick="abrirCarrinho()">
🛒 <span id="contadorCarrinho">0</span>
</button>

<div class="carrinho" id="carrinho">
  <h3>Seu Carrinho</h3>
  <div id="itensCarrinho"></div>
  <div class="total">Total: <span id="valorTotal">R$ 0,00</span></div>
  <button class="btn-finalizar" onclick="abrirCheckout()">Finalizar Pedido</button>
</div>

<div class="modal" id="modalCheckout">
  <div class="modal-content" id="checkoutConteudo"></div>
</div>

<footer>
R. Sete de Agosto, 28 - Centro, Passo Fundo - RS, 99025-030
</footer>

<!-- BANNER INSTALAÇÃO -->
<div id="installBanner" style="
display:none;
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:white;
padding:15px 20px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
z-index:99999;
max-width:90%;
font-size:14px;
text-align:center;
">
</div>

</body>
</html>
