<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odòmàiyá Artigos Religiosos</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--dark:#0d1b2a;
--dark2:#1b263b;
--silver:#cbd5e1;
--lux:#0f766e;
--light:#f8fafc;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:var(--light);
color:#111;
}

header{
background:linear-gradient(135deg,var(--dark),var(--dark2));
text-align:center;
padding:60px 20px 80px 20px;
position:relative;
}

.logo-wrapper{
width:160px;
height:160px;
margin:0 auto 20px auto;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

.logo-wrapper img{
max-width:120px;
height:auto;
object-fit:contain;
}

h1{
font-family:'Playfair Display',serif;
color:white;
font-size:42px;
letter-spacing:2px;
}

.subtitle{
color:var(--silver);
margin-top:8px;
}

.cart-btn{
position:fixed;
top:25px;
right:25px;
background:var(--dark2);
color:white;
padding:12px 20px;
border-radius:50px;
font-weight:600;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.cart-btn span{
background:white;
color:var(--dark2);
padding:3px 9px;
border-radius:50px;
margin-left:6px;
}

.products{
max-width:1300px;
margin:-50px auto 60px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
padding:0 20px;
}

.card{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,0.08);
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.price{
font-weight:700;
font-size:20px;
}

.old{
text-decoration:line-through;
color:red;
font-size:14px;
margin-right:10px;
}

button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:var(--dark2);
color:white;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
background:var(--lux);
}

footer{
background:var(--dark);
color:white;
padding:40px 20px;
text-align:center;
}

.social a{
margin:0 10px;
color:white;
font-size:20px;
text-decoration:none;
}
</style>
</head>

<body>

<div class="cart-btn" onclick="abrirCheckout()">
🛒 Carrinho <span id="cart-count">0</span>
</div>

<header>
<div class="logo-wrapper">
<img src="logo.png">
</div>
<h1>Odòmàiyá Artigos Religiosos</h1>
<p class="subtitle">Luxo Espiritual • Tradição • Energia</p>
</header>

<div class="products" id="produtos"></div>

<footer>
<p>📍 R. Sete de Agosto, 28 - Centro, Passo Fundo - RS, 99025-030</p>
<p>📞 (54) 9604-8808</p>
<div class="social">
<a href="https://wa.me/555496048808" target="_blank">WhatsApp</a>
<a href="https://www.instagram.com/odomaia_artigosreligiosos" target="_blank">Instagram</a>
</div>
</footer>

<script>
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || []
let produtos = []

function atualizarCarrinho(){
document.getElementById("cart-count").innerText = carrinho.length
localStorage.setItem("carrinho",JSON.stringify(carrinho))
}

fetch('produtos.csv')
.then(r=>r.text())
.then(text=>{
let linhas=text.trim().split('\n').slice(1)
linhas.forEach(l=>{
let [nome,preco,promocao,categoria,imagem,estoque]=l.split(',')
produtos.push({
nome,
preco:parseFloat(preco)||0,
promocao:parseFloat(promocao)||0,
categoria,
imagem,
estoque:parseInt(estoque)||0
})
})
render()
})

function render(){
let container=document.getElementById("produtos")
container.innerHTML=""

produtos.forEach((p,i)=>{
let precoFinal = p.promocao>0 ? p.promocao : p.preco

container.innerHTML+=`
<div class="card">
<img src="imagens/${p.imagem}">
<div class="card-content">
<h3>${p.nome}</h3>
<div>
${p.promocao>0?`<span class="old">R$ ${p.preco}</span>`:''}
<span class="price">R$ ${precoFinal}</span>
</div>
<p>Estoque: ${p.estoque}</p>
<button onclick="addCarrinho(${i})" ${p.estoque<=0?'disabled':''}>
${p.estoque<=0?'Esgotado':'Adicionar ao Carrinho'}
</button>
</div>
</div>`
})
}

function addCarrinho(i){
if(produtos[i].estoque<=0)return
produtos[i].estoque--
carrinho.push(produtos[i])
atualizarCarrinho()
render()
}

function abrirCheckout(){
let nome=prompt("Digite seu nome:")
if(!nome)return

let tipo=prompt("Digite 1 para Retirada ou 2 para Entrega")
let endereco=""
if(tipo==2){
endereco=prompt("Digite seu endereço completo:")
}

let pagamento=prompt("Forma de pagamento (Pix, Dinheiro, Cartão):")

let texto=`Pedido - Odòmàiyá Artigos Religiosos\n\nCliente: ${nome}\n`

carrinho.forEach(p=>{
let valor=p.promocao>0?p.promocao:p.preco
texto+=`${p.nome} - R$ ${valor}\n`
})

texto+=`\nTipo: ${tipo==2?'Entrega':'Retirada'}`
if(endereco) texto+=`\nEndereço: ${endereco}`
texto+=`\nPagamento: ${pagamento}`

window.open("https://wa.me/555496048808?text="+encodeURIComponent(texto))
}
atualizarCarrinho()
</script>

</body>
</html>
