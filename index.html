<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Odòmáiyà Artigos Religiosos</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animations.css">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.png">

</head>

<body>

<header class="header">

<div class="logo-area">

<img src="logo.png" class="logo" id="logoAdmin">

<h1>Odòmáiyà</h1>

</div>

<div class="search-area">
<input id="busca" placeholder="Buscar produtos...">
</div>

<div class="cart-icon" onclick="UI.toggleCart()">
🛒 <span id="cartCount">0</span>
</div>

</header>



<section class="filters">

<select id="filtroCategoria">
<option value="">Todas categorias</option>
</select>

<button onclick="FILTROS.promocao()">Promoção</button>
<button onclick="FILTROS.estoque()">Estoque baixo</button>

</section>



<main>

<div id="produtos" class="produtos-grid"></div>

</main>



<!-- CARRINHO -->

<div id="cartDrawer" class="cart-drawer">

<h2>Carrinho</h2>

<div id="cartItems"></div>

<div class="cart-total">
Total: <span id="cartTotal">R$ 0</span>
</div>

<button class="checkout-btn" onclick="CHECKOUT.abrir()">
Finalizar Pedido
</button>

</div>



<!-- CHECKOUT -->

<div id="checkoutModal" class="modal">

<div class="modal-content">

<h2>Finalizar Pedido</h2>

<input id="cliente" placeholder="Seu nome">

<select id="tipoPedido">
<option value="entrega">Entrega</option>
<option value="retirada">Retirada</option>
</select>

<select id="pagamento">
<option>PIX</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>

<div id="enderecoArea">

<input id="rua" placeholder="Rua">
<input id="numero" placeholder="Número">
<input id="cidade" placeholder="Cidade">

</div>

<button onclick="CHECKOUT.finalizar()">
Enviar Pedido
</button>

</div>

</div>



<!-- SEU SISTEMA PRINCIPAL -->

<script src="js/app.js"></script>



<script>

/* =========================
API Apps Script
========================= */

const API = "https://script.google.com/macros/s/AKfycbzKW5BVJQBvZAdqV7CVfxgpqJEpp33l-sK-IYphC22AbLxBu04ML8D9l25fB5hktSty/exec"



/* =========================
ADMIN SECRETO
========================= */

const logo = document.getElementById("logoAdmin")

let clicks = 0
let clickTimer


function abrirAdmin(){

const user = prompt("Usuário")
const pass = prompt("Senha")

if(user === "adm" && pass === "99861309"){

window.location = "admin.html"

}else{

alert("Acesso negado")

}

}



/* 7 cliques rápidos */

logo.addEventListener("click", () => {

clicks++

clearTimeout(clickTimer)

clickTimer = setTimeout(()=>{

clicks = 0

},800)

if(clicks >= 7){

abrirAdmin()

}

})



/* segurar 3 segundos no celular */

let pressTimer

logo.addEventListener("touchstart", () => {

pressTimer = setTimeout(()=>{

abrirAdmin()

},3000)

})

logo.addEventListener("touchend", () => {

clearTimeout(pressTimer)

})



/* CTRL SHIFT 1 no computador */

document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.shiftKey && e.key === "!"){

abrirAdmin()

}

})



/* =========================
PWA
========================= */

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js")

}

</script>

</body>
</html>
