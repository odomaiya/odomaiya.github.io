<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odòmàiyá Artigos Religiosos</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="topo">
  <div class="logo-area">
    <img src="logo.png" class="logo">
    <div>
      <h1>Odòmàiyá</h1>
      <p>Artigos Religiosos</p>
    </div>
  </div>

  <div class="social">
    <a href="https://wa.me/555496048808" target="_blank">WhatsApp</a>
    <a href="https://www.instagram.com/odomaia_artigosreligiosos" target="_blank">Instagram</a>
  </div>
</header>

<section class="busca-area">
  <input type="text" id="busca" placeholder="Buscar produto...">
  <div id="filtros"></div>
</section>

<section id="produtos" class="grid"></section>

<!-- BOTÃO FLUTUANTE -->
<button class="btn-carrinho" onclick="abrirCarrinho()">
🛒 <span id="contadorCarrinho">0</span>
</button>

<!-- DRAWER CARRINHO -->
<div id="drawerCarrinho" class="drawer">
  <div class="drawer-content">
    <div class="drawer-header">
      <h3>Seu Carrinho</h3>
      <button onclick="fecharCarrinho()">✕</button>
    </div>

    <div id="itensCarrinho"></div>

    <div class="total">
      Total: <span id="valorTotal">R$ 0,00</span>
    </div>

    <button onclick="abrirCheckout()" class="btn-finalizar">
      Finalizar Pedido
    </button>
  </div>
</div>

<!-- MODAL CHECKOUT -->
<div id="modalCheckout" class="modal">
  <div class="modal-content" id="checkoutConteudo"></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
