<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odòmáiyà Artigos Religiosos</title>

<link rel="icon" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script defer src="js/app.js"></script>

<meta name="theme-color" content="#0B2A4A">
</head>

<body>

<div id="overlay"></div>

<header class="header">
  <div class="logo-area">
    <img src="logo.png" class="logo">
    <div>
      <h1>Odòmáiyà</h1>
      <p>Artigos Religiosos</p>
    </div>
  </div>

  <div class="social">
    <a href="https://wa.me/555496048808" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" class="icon-mini">
      WhatsApp
    </a>
    <a href="https://www.instagram.com/odomaia_artigosreligiosos" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733558.png" class="icon-mini">
      Instagram
    </a>
  </div>
</header>

<section class="filtros">
  <input type="text" id="busca" placeholder="Buscar produto...">
</section>

<section id="produtos" class="grid"></section>

<button class="btn-carrinho" onclick="abrirCarrinho()">
🛒 <span id="contadorCarrinho">0</span>
</button>

<div class="carrinho" id="carrinho">
  <div class="carrinho-header">
    <h3>Seu Carrinho</h3>
    <button onclick="fecharCarrinho()">✕</button>
  </div>
  <div id="itensCarrinho"></div>
  <div class="carrinho-footer">
    <div>Total: <span id="valorTotal">R$ 0,00</span></div>
    <button class="btn-finalizar" onclick="abrirCheckout()">Finalizar Pedido</button>
  </div>
</div>

<div class="modal" id="modalCheckout">
  <div class="modal-conteudo">
    <h3>Finalizar Pedido</h3>

    <input type="text" id="cliente" placeholder="Seu nome">
    <input type="tel" id="telefone" placeholder="Telefone">

    <select id="tipo">
      <option value="retirada">Retirada</option>
      <option value="entrega">Entrega</option>
    </select>

    <div id="enderecoArea" style="display:none;">
      <input type="text" id="cep" placeholder="CEP">
      <input type="text" id="rua" placeholder="Rua">
      <input type="text" id="numero" placeholder="Número">
      <input type="text" id="cidade" placeholder="Cidade">
    </div>

    <select id="pagamento">
      <option value="pix">Pix</option>
      <option value="cartao">Cartão</option>
      <option value="dinheiro">Dinheiro</option>
    </select>

    <div id="sugestaoArea"></div>

    <button class="btn-finalizar-modal" onclick="finalizar()">Enviar Pedido</button>
  </div>
</div>

</body>
</html>
