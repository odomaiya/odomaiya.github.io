<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧿 Odòmáiyà Artigos Religiosos</title>

<link rel="stylesheet" href="estilo.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="hero">
  <div class="hero-content">
    <h1>🧿 Odòmáiyà Artigos Religiosos</h1>
    <p>Conectando fé, ancestralidade e força espiritual em cada detalhe.</p>
  </div>
</header>

<section class="barra-topo">
  <input type="text" id="busca" placeholder="🔎 Buscar produto...">
  <div id="categorias"></div>
</section>

<main id="produtos" class="produtos"></main>

<!-- BOTÃO CARRINHO -->
<div class="cart-btn" onclick="abrirCarrinho()">
  🛒 <span id="contador">0</span>
</div>

<!-- CARRINHO LATERAL -->
<div id="carrinho" class="carrinho">
  <div class="carrinho-header">
    <h2>Seu Pedido</h2>
    <button onclick="fecharCarrinho()">✕</button>
  </div>

  <div id="itensCarrinho"></div>

  <div class="carrinho-footer">
    <h3>Total: <span id="total">R$ 0,00</span></h3>
    <button class="btn-principal" onclick="abrirCheckout()">Finalizar Pedido</button>
  </div>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="checkout">
  <div class="checkout-box">

    <div class="checkout-header">
      <h2>Finalizar Pedido</h2>
      <button onclick="fecharCheckout()">✕</button>
    </div>

    <div class="etapas">
      <div class="etapa ativa" id="etapa-1">
        <input type="text" id="cliente-nome" placeholder="Seu nome">
        <button class="btn-principal" onclick="proximaEtapa()">Continuar</button>
      </div>

      <div class="etapa" id="etapa-2">
        <label><input type="radio" name="entrega" value="Retirada" onclick="tipoEntrega('retirada')"> Retirar na loja</label>
        <label><input type="radio" name="entrega" value="Entrega" onclick="tipoEntrega('entrega')"> Entrega</label>

        <div id="campo-endereco"></div>

        <button onclick="voltarEtapa()">Voltar</button>
        <button class="btn-principal" onclick="proximaEtapa()">Continuar</button>
      </div>

      <div class="etapa" id="etapa-3">
        <select id="pagamento">
          <option value="">Forma de pagamento</option>
          <option>Crédito</option>
          <option>Débito</option>
          <option>Pix</option>
          <option>Dinheiro</option>
        </select>

        <button onclick="voltarEtapa()">Voltar</button>
        <button class="btn-principal" onclick="finalizarPedido()">Confirmar Pedido</button>
      </div>
    </div>

  </div>
</div>

<div id="loader" class="loader">✨ Enviando pedido...</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
