<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odòmáiyà Artigos Religiosos</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<div class="particles"></div>

<header class="header">
  <h1>Odòmáiyà Artigos Religiosos</h1>
  <p>Conectando fé, ancestralidade e força espiritual.</p>
</header>

<section class="controls">
  <input type="text" id="busca" placeholder="🔎 Buscar produto...">
  <div id="filtros"></div>
</section>

<section id="produtos" class="grid"></section>

<button id="btnFinalizar" class="btn-finalizar" onclick="abrirCheckout()">
🛒 Finalizar Pedido (<span id="totalItens">0</span>)
</button>

<!-- MODAL -->
<div id="checkoutModal" class="modal">
  <div class="modal-content">
    <div id="checkoutSteps"></div>
  </div>
</div>

<!-- SUCCESS PAGE -->
<div id="successPage" class="success">
  <h2>Pedido Enviado ✨</h2>
  <p>Você será direcionado para o WhatsApp.</p>
</div>

<script src="app.js"></script>
</body>
</html>
