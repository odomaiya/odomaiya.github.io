<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odòmáiyà Artigos Religiosos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/app.js" defer></script>

</head>
<body>

<div class="carrinho-backdrop" id="carrinhoBackdrop" onclick="fecharCarrinho()"></div>

<header class="header">
  <h1>Odòmáiyà</h1>
</header>

<section id="produtos" class="grid"></section>

<button class="btn-carrinho" onclick="abrirCarrinho()">
🛒 <span id="contadorCarrinho">0</span>
</button>

<div class="carrinho" id="carrinho">
  <div class="carrinho-topo">
    <h3>Seu Carrinho</h3>
    <button class="fechar-x" onclick="fecharCarrinho()">✕</button>
  </div>
  <div id="itensCarrinho"></div>
  <div class="total">Total: <span id="valorTotal">R$ 0,00</span></div>
  <button class="btn-finalizar" onclick="abrirCheckout()">Finalizar Pedido</button>
</div>

<div class="modal" id="modalCheckout">
  <div class="modal-content" id="checkoutConteudo"></div>
</div>

</body>
</html>
