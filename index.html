<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odòmáiyà Artigos Religiosos</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>

<body>

<header>
  <div class="logo-area">
    <img src="logo.png" class="logo">
    <div>
      <h1>Odòmáiyà</h1>
      <span>Artigos Religiosos</span>
    </div>
  </div>
  <button onclick="abrirCarrinho()">🛒 Carrinho</button>
</header>

<section class="busca-area">
  <input type="text" id="busca" placeholder="Buscar produto...">
</section>

<section id="produtos" class="grid"></section>

<footer>
  <div class="footer-content">
    <p>Odòmáiyà Artigos Religiosos</p>
    <p>Endereço da Loja Aqui</p>
    <p>WhatsApp: (54) 9604-8808</p>
  </div>
</footer>

<!-- CARRINHO -->
<div id="modalCarrinho" class="modal">
  <div class="modal-content">
    <h2>Seu Carrinho</h2>
    <div id="itensCarrinho"></div>
    <p>Total: <strong id="valorTotal">R$ 0,00</strong></p>
    <button onclick="abrirCheckout()">Finalizar</button>
    <button onclick="fecharCarrinho()">Fechar</button>
  </div>
</div>

<!-- CHECKOUT -->
<div id="modalCheckout" class="modal">
  <div class="modal-content" id="conteudoCheckout"></div>
</div>

<script src="app.js"></script>
</body>
</html>
