<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odòmàiyá Artigos Religiosos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="topo">
  <div class="logo-area">
    <img src="logo.png" class="logo">
    <div>
      <h1>Odòmàiyá</h1>
      <p>Artigos Religiosos</p>
    </div>
  </div>

  <div class="social">
    <a href="https://wa.me/555496048808" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
    </a>
    <a href="https://instagram.com/odomaia_artigosreligiosos" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
    </a>
  </div>
</header>

<section class="busca-area">
  <input type="text" id="busca" placeholder="Buscar produto...">
  <div id="filtros"></div>
</section>

<section id="produtos" class="grid"></section>

<!-- BOTÃO FLUTUANTE -->
<button id="btn-carrinho" onclick="abrirCarrinho()">
  🛒 <span id="contador">0</span>
</button>

<!-- OVERLAY -->
<div id="overlay" onclick="fecharCarrinho()"></div>

<!-- CARRINHO LATERAL -->
<div id="carrinho-lateral">
  <div class="carrinho-topo">
    <h3>Seu Carrinho</h3>
    <button onclick="fecharCarrinho()">✕</button>
  </div>

  <div id="carrinho-itens"></div>

  <div class="carrinho-rodape">
    <p>Total: <strong id="total-carrinho">R$ 0,00</strong></p>
    <button onclick="abrirCheckout()">Finalizar Pedido</button>
  </div>
</div>

<!-- CHECKOUT -->
<div id="checkout-modal" class="modal">
  <div class="modal-content" id="checkout-content"></div>
</div>

<footer>
  <strong>Odòmàiyá Artigos Religiosos</strong><br>
  R. Sete de Agosto, 28 - Centro<br>
  Passo Fundo - RS, 99025-030
</footer>

<script src="js/app.js"></script>
</body>
</html>
