<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Odòmáiyà Artigos Religiosos</title>

  <!-- CSS CORRETO -->
  <link rel="stylesheet" href="css/style.css">

  <!-- FAVICON -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1e3a5f">

</head>
<body>

<header class="header">
  <img src="logo.png" alt="Odòmáiyà Logo" class="logo">
  <h1>Odòmáiyà</h1>
</header>

<section class="top-bar">
  <input type="text" id="busca" placeholder="Buscar produtos...">
  <div class="cart-icon" onclick="abrirCarrinho()">
    🛒 <span id="cart-count">0</span>
  </div>
</section>

<main id="produtos" class="grid-produtos"></main>

<footer class="footer">
  <div>Total: R$ <span id="total">0,00</span></div>
  <button onclick="abrirCheckout()">Finalizar Pedido</button>
</footer>

<!-- DRAWER CARRINHO -->
<div id="drawer" class="drawer">
  <div class="drawer-header">
    <h2>Seu Pedido</h2>
    <button onclick="fecharCarrinho()">✕</button>
  </div>
  <div id="itens-carrinho"></div>
</div>

<!-- MODAL CHECKOUT -->
<div id="modal-checkout" class="modal">
  <div class="modal-content">
    <h2>Finalizar Pedido</h2>

    <input type="text" id="nome" placeholder="Seu nome" required>
    <input type="text" id="telefone" placeholder="Telefone" required>
    <input type="text" id="endereco" placeholder="Endereço" required>

    <button onclick="enviarPedido()">Confirmar Pedido</button>
    <button onclick="fecharCheckout()">Cancelar</button>
  </div>
</div>

<!-- JS CORRETO -->
<script src="js/app.js"></script>

<!-- SERVICE WORKER -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

</body>
</html>
