<!DOCTYPE html>
<html lang="pt-br">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odòmàiyá Artigos Religiosos</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--primary:#0f1c2b;
--secondary:#1f3247;
--accent:#7fa8c9;
--lux:#d6e4f0;
--danger:#b91c1c;
--promo:#0f766e;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{background:#f8fafc;color:#111}

header{
background:linear-gradient(135deg,#0f1c2b,#1f3247);
padding:40px 20px;
text-align:center;
color:white;
}

header img{height:120px;margin-bottom:15px}

h1{
font-family:'Playfair Display',serif;
font-size:38px;
letter-spacing:2px;
}

.products{
max-width:1300px;
margin:60px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:35px;
padding:0 20px;
}

.card{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
transition:.3s;
position:relative;
}

.card:hover{transform:translateY(-8px)}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card-content{padding:20px}

.card h3{margin-bottom:10px;font-size:18px}

.price{font-size:20px;font-weight:700;color:var(--secondary)}

.old-price{
text-decoration:line-through;
color:var(--danger);
font-size:15px;
margin-right:10px;
}

.badge{
position:absolute;
top:15px;
left:15px;
background:var(--promo);
color:white;
padding:6px 12px;
border-radius:50px;
font-size:13px;
font-weight:600;
}

button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:var(--secondary);
color:white;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{background:var(--primary)}

.cart{
position:fixed;
top:25px;
right:25px;
background:var(--secondary);
color:white;
padding:12px 18px;
border-radius:50px;
font-weight:600;
cursor:pointer;
}

.cart span{
background:white;
color:var(--secondary);
padding:3px 8px;
border-radius:50px;
margin-left:8px;
}

footer{
margin-top:80px;
background:#0f1c2b;
color:white;
text-align:center;
padding:30px;
}
</style>
</head>

<body>

<header>
<img src="logo.png">
<h1>Odòmàiyá Artigos Religiosos</h1>
<p>Luxo Espiritual • Tradição • Energia</p>
</header>

<div class="cart" onclick="abrirCheckout()">
🛒 Carrinho <span id="cart-count">0</span>
</div>

<div class="products" id="produtos"></div>

<footer>
<p>WhatsApp: (54) 9604-8808</p>
<p>R. Sete de Agosto, 28 - Centro, Passo Fundo - RS</p>
</footer>

<script>
let carrinho=[]
let produtos=[]

fetch('produtos.csv')
.then(res=>res.text())
.then(text=>{
const linhas=text.split('\n').slice(1)
linhas.forEach(l=>{
const [nome,preco,promocao,categoria,imagem,estoque]=l.split('\t')
produtos.push({
nome,
preco:parseFloat(preco),
promocao:parseFloat(promocao),
categoria,
imagem,
estoque:parseInt(estoque)
})
})
render()
})

function render(){
const container=document.getElementById("produtos")
container.innerHTML=""

produtos.forEach((p,i)=>{
if(!p.nome)return

let precoFinal=p.promocao>0?p.promocao:p.preco

container.innerHTML+=`
<div class="card">
${p.promocao>0?'<div class="badge">OFERTA</div>':''}
<img src="imagens/${p.imagem}">
<div class="card-content">
<h3>${p.nome}</h3>
<div>
${p.promocao>0?`<span class="old-price">R$ ${p.preco}</span>`:''}
<span class="price">R$ ${precoFinal}</span>
</div>
<p>Estoque: ${p.estoque}</p>
<button onclick="addCarrinho(${i})" ${p.estoque<=0?'disabled':''}>
${p.estoque<=0?'Esgotado':'Adicionar ao Carrinho'}
</button>
</div>
</div>`
})
}

function addCarrinho(i){
if(produtos[i].estoque<=0)return
produtos[i].estoque--
carrinho.push(produtos[i])
document.getElementById("cart-count").innerText=carrinho.length
render()
}

function abrirCheckout(){
let texto="Pedido - Odòmàiyá Artigos Religiosos%0A%0A"
carrinho.forEach(p=>{
let valor=p.promocao>0?p.promocao:p.preco
texto+=p.nome+" - R$ "+valor+"%0A"
})
window.open("https://wa.me/555496048808?text="+texto)
}
</script>

</body>
</html>
