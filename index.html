<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Odòmáiyà Artigos Religiosos</title>

<link rel="icon" href="favicon.png">
<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animations.css">

</head>

<body>

<header class="header">

<div class="logo-area">
<img src="logo.png" class="logo">
<h1>Odòmáiyà</h1>
</div>

<input id="search" placeholder="Buscar produtos...">

<button id="cartBtn">
🛒 <span id="cartCount">0</span>
</button>

</header>

<section class="hero">

<h2>Artigos Religiosos</h2>
<p>Energia • Espiritualidade • Tradição</p>

</section>

<main>

<div id="products" class="grid"></div>

<div id="loading">Carregando produtos...</div>

</main>

<aside id="cart" class="cart">

<h2>Carrinho</h2>

<div id="cartItems"></div>

<div class="cartTotal">
Total: <span id="total">R$0</span>
</div>

<button id="checkout">Finalizar Pedido</button>

</aside>

<canvas id="particles"></canvas>

<script src="js/app.js"></script>

</body>
</html>
