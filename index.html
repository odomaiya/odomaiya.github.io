<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Odòmáiyà Artigos Religiosos</title>

<link rel="icon" href="favicon.png">

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animations.css">

</head>

<body>

<header class="header">

<div class="logoBox">

<img src="logo.png" class="logo">

<h1>Odòmáiyà</h1>

</div>

<input id="search" placeholder="Buscar produtos">

<button id="cartBtn">

🛒 <span id="cartCount">0</span>

</button>

</header>

<main>

<section id="produtos" class="grid"></section>

</main>

<aside id="cart" class="cart">

<h2>Carrinho</h2>

<div id="cartItems"></div>

<div class="cartTotal">

Total: <span id="cartTotal">R$0</span>

</div>

<button onclick="abrirCheckout()">

Finalizar Pedido

</button>

</aside>

<div id="checkout" class="checkout hidden">

<h2>Finalizar pedido</h2>

<input id="clienteNome" placeholder="Seu nome">

<select id="tipoEntrega">

<option value="entrega">Entrega</option>

<option value="retirada">Retirada na loja</option>

</select>

<select id="formaPagamento">

<option>PIX</option>

<option>Dinheiro</option>

<option>Cartão</option>

</select>

<div id="enderecoBox">

<input id="rua" placeholder="Rua">

<input id="numero" placeholder="Número">

<input id="cidade" placeholder="Cidade">

</div>

<button onclick="finalizarPedido()">

Enviar pedido

</button>

</div>

<script src="js/app.js"></script>

</body>
</html>
