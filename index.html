<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odòmáiyà Artigos Religiosos</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
  <div class="logo">
    <img src="logo.png">
    <div>
      <h1>Odòmáiyà</h1>
      <span>Artigos Religiosos</span>
    </div>
  </div>

  <div class="actions">
    <input type="text" id="buscar" placeholder="Buscar produto...">
    <button id="abrir-carrinho">🛒 <span id="contador">0</span></button>
  </div>
</header>

<main>
  <div id="produtos" class="grid"></div>
</main>

<!-- CARRINHO -->
<aside id="carrinho" class="carrinho">
  <div class="carrinho-header">
    <h2>Seu Carrinho</h2>
    <button id="fechar-carrinho">✕</button>
  </div>

  <div id="carrinho-itens" class="carrinho-itens"></div>

  <div class="checkout">
    <div class="total">
      Total: <span id="carrinho-total">R$ 0,00</span>
    </div>

    <input id="cliente" placeholder="Seu nome">

    <select id="entrega">
      <option value="Entrega">Entrega</option>
      <option value="Retirada">Retirada</option>
    </select>

    <select id="pagamento">
      <option value="Pix">Pix</option>
      <option value="Dinheiro">Dinheiro</option>
      <option value="Cartão">Cartão</option>
    </select>

    <button id="btn-finalizar" class="btn-finalizar">
      Finalizar Pedido
    </button>
  </div>
</aside>

<script src="js/api.js"></script>
<script src="js/estoque.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
